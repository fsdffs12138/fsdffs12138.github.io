# ===== Butterfly 主题配置（覆盖 node_modules 中的默认配置）=====
# 官方文档：https://butterfly.js.org/

# ---------- Navigation ----------
nav:
  logo:
  display_title: true
  fixed: true   # 导航栏吸顶，滚动时保持可见

# 菜单顺序参考 hmxs.games：主页 / 关于 / 分类 / 标签 / 归档 / 友链
menu:
  主页: / || fas fa-home
  关于: /about/ || fas fa-heart
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tags
  归档: /archives/ || fas fa-archive
  友链: /link/ || fas fa-link

# ---------- 首页站点信息（Banner 中央区）----------
# 打字机效果的副标题（Typed.js）
subtitle:
  enable: true
  effect: true        # 开启打字机效果
  loop: true
  source: false       # 不从外部一言 API 拉，使用 sub 列表
  sub:
    - "Weathering with games."
    - "ゲームをしましょう！"
    - "Graphics · Gameplay · Craft"
    - "一个技术美术的思考留痕"

# ---------- Code Blocks ----------
highlight_theme: mac light
highlight_copy: true
highlight_lang: true
highlight_shrink: false
highlight_height_limit: false
code_word_wrap: false

# ---------- Social ----------
social:
  fab fa-github: https://github.com/fsdffs12138 || GitHub
  fas fa-envelope: mailto:784536651@qq.com || Email
  # fab fa-bilibili: https://space.bilibili.com/你的UID || Bilibili

# ---------- Image (首页头图/封面)----------
# index_img 留空时会使用 top_img；这里用本地 banner
index_img: /img/index_banner.png
default_top_img: /img/index_banner.png
archive_img:
tag_img:
category_img:

# 首页封面图：不设置时用 default_cover（此处用默认）
cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:

# ---------- Article ----------
toc:
  post: true
  page: true
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 文章页显示更新时间
post_meta:
  page:
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true
  post:
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# ---------- Sidebar ----------
# widget 顺序参考 hmxs.games：
# author -> announcement -> recent-post -> categories -> tags -> archives -> webinfo
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 图形 / 游戏 / 工具链的思考留痕
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/fsdffs12138
  card_announcement:
    enable: true
    content: 欢迎来到 arthurs 的小站 🎮 这里是图形、游戏与工具链的思考留痕。
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order:
  card_tags:
    enable: true
    limit: 40
    color: true     # 彩色标签云（参考目标站）
    sort_order:
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
    sort_order:
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:

# ---------- Local Search ----------
local_search:
  enable: true
  preload: false
  CDN:

# ---------- 顶部进度条（pace-js）----------
pace:
  enable: true
  # theme options：minimal / center-simple / flash / center-atom / ...
  theme: minimal

# ---------- Footer ----------
footer:
  owner:
    enable: true
    since: 2026
  copyright:
    enable: true
    version:
  custom_text:

# ---------- Color / Theme ----------
theme_color:
  enable: true
  main: "#49B1F5"
  paginator: "#00c4b6"
  button_hover: "#FF7242"
  text_selection: "#00c4b6"
  link_color: "#99a9bf"
  meta_color: "#858585"
  hr_color: "#A4D8FA"
  code_foreground: "#F47466"
  code_background: "rgba(27, 31, 35, .05)"
  toc_color: "#00c4b6"
  blockquote_padding_color: "#49b1f5"
  blockquote_background_color: "#49b1f5"
  scrollbar_color: "#49b1f5"

# ---------- Darkmode ----------
darkmode:
  enable: true
  button: true
  autoChangeMode: 1    # 1: 跟随系统; 2: 固定时间段切换
  start:
  end:

# ---------- 右侧工具栏 ----------
rightside_bottom: 0
rightside:
  readmode: true
  aside_button: true

# ---------- Analytics / Comments (暂不启用) ----------
# waline / twikoo / gitalk 等，等你需要的时候再开

# ---------- Mathjax / Katex ----------
mathjax:
  enable: false
  per_page: false

# ---------- Pjax（页面不刷新切换）----------
pjax:
  enable: true
  exclude:

# ---------- CDN ----------
CDN:
  internal_provider: local
  third_party_provider: jsdelivr

