# ===== Butterfly 主题配置（覆盖 node_modules 中的默认配置）=====
# 官方文档：https://butterfly.js.org/

# ---------- Navigation ----------
nav:
  logo:
  display_title: true
  fixed: false

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tags
  关于: /about/ || fas fa-heart

# ---------- Code Blocks ----------
highlight_theme: mac light
highlight_copy: true
highlight_lang: true
highlight_shrink: false
highlight_height_limit: false
code_word_wrap: false

# ---------- Social ----------
social:
  fab fa-github: https://github.com/arthursfeng || GitHub
  # fas fa-envelope: mailto:your@email || Email

# ---------- Image (首页头图/封面)----------
# 默认先用 Butterfly 自带的 default.png；后续你可以换成自己的图
index_img:
default_top_img:
archive_img:
tag_img:
category_img:

# 首页文章不显示封面图时使用的占位（设为 false 即不显示）
cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:

# ---------- Article ----------
toc:
  post: true
  page: true
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 文章页显示更新时间
post_meta:
  page:
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true
  post:
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# ---------- Sidebar ----------
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description:
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/arthursfeng
  card_announcement:
    enable: true
    content: 欢迎来到 arthurs 的小站 🎮 这里是图形、游戏与工具链的思考留痕。
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order:
  card_tags:
    enable: true
    limit: 40
    color: false
    sort_order:
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
    sort_order:
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:

# ---------- Local Search ----------
local_search:
  enable: true
  preload: false
  CDN:

# ---------- Footer ----------
footer:
  owner:
    enable: true
    since: 2026
  copyright:
    enable: true
    version:
  custom_text:

# ---------- Color / Theme ----------
theme_color:
  enable: true
  main: "#49B1F5"
  paginator: "#00c4b6"
  button_hover: "#FF7242"
  text_selection: "#00c4b6"
  link_color: "#99a9bf"
  meta_color: "#858585"
  hr_color: "#A4D8FA"
  code_foreground: "#F47466"
  code_background: "rgba(27, 31, 35, .05)"
  toc_color: "#00c4b6"
  blockquote_padding_color: "#49b1f5"
  blockquote_background_color: "#49b1f5"
  scrollbar_color: "#49b1f5"

# ---------- Darkmode ----------
darkmode:
  enable: true
  button: true
  autoChangeMode: 1    # 1: 跟随系统; 2: 固定时间段切换
  start:
  end:

# ---------- Reading progress / Back-to-top ----------
rightside_bottom: 0
rightside:
  readmode: true
  aside_button: true

# ---------- Analytics / Comments (暂不启用) ----------
# waline / twikoo / gitalk 等，等你需要的时候再开

# ---------- Mathjax / Katex ----------
# 写图形/渲染笔记时可能用到公式，先不默认开，文章内单独开即可
mathjax:
  enable: false
  per_page: false

# ---------- 开启 Pjax（页面不刷新切换，提速浏览）----------
pjax:
  enable: true
  exclude:

# ---------- CDN（默认 jsdelivr）----------
CDN:
  internal_provider: local
  third_party_provider: jsdelivr
